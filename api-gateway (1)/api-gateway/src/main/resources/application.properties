spring.application.name=api-gateway
server.port=8080

spring.cloud.gateway.server.webmvc.routes[0].id=chatbot-engine
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8000
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/chat/**

spring.cloud.gateway.server.webmvc.routes[1].id=organization-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/organization/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[2].id=chatbot-bridge
spring.cloud.gateway.server.webmvc.routes[2].uri=http://localhost:8082
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/bridge/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=StripPrefix=1
spring.cloud.gateway.server.webmvc.routes[2].filters[1]=AddRequestHeader=X-User-Id,Vivek

springdoc.swagger-ui.urls[0].name=Organization Service
springdoc.swagger-ui.urls[0].url=/organization/v3/api-docs

springdoc.swagger-ui.urls[1].name=Chatbot Bridge
springdoc.swagger-ui.urls[1].url=/bridge/v3/api-docs




logging.level.root=INFO
logging.level.com.chatbot=DEBUG