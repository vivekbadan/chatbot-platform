services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  api-gateway:
    build: "./api-gateway (1)/api-gateway"
    ports:
      - "8080:8080"
    environment:
      SPRING_CLOUD_GATEWAY_SERVER_WEBMVC_ROUTES_0_URI: http://chatbot-engine:8083
    depends_on:
      - db
      - rabbitmq
      - chatbot-engine
    networks:
      - backend

  chatbot-bridge:
    build: ./chatbot-bridge/chatbot-bridge
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
    depends_on:
      - db
      - rabbitmq
    networks:
      - backend

  organization-service:
    build: ./organization-service/organization-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - db
      - rabbitmq
    networks:
      - backend

  chatbot-engine:
    build: ./chatbot-engine
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
    depends_on:
      - db
      - rabbitmq
    networks:
      - backend

volumes:
  db-data:

networks:
  backend:
    driver: bridge
