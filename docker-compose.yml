services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  api-gateway:
    build: "./api-gateway (1)/api-gateway"
    ports:
      - "8080:8080"
    depends_on:
      - db
      - rabbitmq
      - chatbot-engine
    networks:
      - backend

  chatbot-bridge:
    build: ./chatbot-bridge/chatbot-bridge
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
    depends_on:
      - db
      - rabbitmq
    networks:
      - backend

  organization-service:
    build: ./organization-service/organization-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - db
      - rabbitmq
    networks:
      - backend

  chatbot-engine:
    build: ./chatbot-engine
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
    depends_on:
      - db
      - rabbitmq
    networks:
      - backend

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-chatbot-ci
    user: root
    ports:
      - "8888:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      JENKINS_OPTS: "--argumentsRealm.passwd.admin=admin --argumentsRealm.roles.admin=admin"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - backend
    depends_on:
      - db
      - rabbitmq

volumes:
  db-data:
  jenkins-data:

networks:
  backend:
    driver: bridge
