apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-engine
  labels:
    app: chatbot-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatbot-engine
  template:
    metadata:
      labels:
        app: chatbot-engine
    spec:
      containers:
        - name: chatbot-engine
          image: chatbot-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: chatbot-engine-config
            - secretRef:
                name: chatbot-engine-secret